<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sentiment Analyzer</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <h1>Sentiment Analyzer</h1>
    <p class="subtitle">Type something below and see how it feels.</p>

    <textarea id="textInput" placeholder="Type or paste a sentence here..."></textarea>

    <button id="analyzeBtn">Analyze</button>

    <div id="result" class="result hidden">
      <div id="resultEmoji" class="emoji"></div>
      <div id="resultLabel" class="label"></div>
      <div id="resultScore" class="score"></div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
